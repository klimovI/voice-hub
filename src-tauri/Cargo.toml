[package]
name = "audio-room-desktop"
version = "0.1.0"
edition = "2021"
description = "Desktop shell for Audio Room built with Tauri"

[lib]
name = "audio_room_desktop_lib"
crate-type = ["cdylib", "rlib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
tauri = { version = "2", features = [] }
