[package]
name = "voice-hub-desktop"
version = "0.1.5"
edition = "2021"
description = "Desktop shell for Voice Hub built with Tauri"

[lib]
name = "voice_hub_desktop_lib"
crate-type = ["cdylib", "rlib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
tauri = { version = "2", features = [] }
