<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128">
  <!-- Глубокий черный фон со скруглением -->
  <rect width="100" height="100" rx="22" fill="#0d0d0d"/>
  
  <!-- Неоново-зеленые полосы -->
  <g fill="#00FF66">
    <!-- Левая часть: формирует букву V -->
    <rect x="18" y="20" width="6" height="30" rx="3"/>
    <rect x="26" y="35" width="6" height="30" rx="3"/>
    <rect x="34" y="50" width="6" height="30" rx="3"/>
    <rect x="42" y="35" width="6" height="30" rx="3"/>
    
    <!-- Правая часть: формирует букву H -->
    <rect x="56" y="20" width="6" height="60" rx="3"/>
    <rect x="64" y="45" width="6" height="10" rx="3"/>
    <rect x="72" y="20" width="6" height="60" rx="3"/>
  </g>
</svg>
