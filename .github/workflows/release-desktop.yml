name: Release Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.1-test)'
        required: true
        default: 'v0.0.0-dev'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: taiki-e/install-action@v2
        with:
          tool: tauri-cli@2.11.0

      - name: Build
        working-directory: src-tauri
        env:
          APP_HOSTNAME: ${{ secrets.DEPLOY_HOST }}
        shell: bash
        run: |
          if [ -z "$APP_HOSTNAME" ]; then
            echo "ERROR: secrets.DEPLOY_HOST not set in repository secrets" >&2
            exit 1
          fi
          export APP_BASE_URL="https://$APP_HOSTNAME/"
          cargo tauri build --target x86_64-pc-windows-msvc

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/voice-hub-desktop.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
