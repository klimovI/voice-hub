name: Release Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.1-test)'
        required: true
        default: 'v0.0.0-dev'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Bake prod config into binary
        shell: bash
        env:
          PROD_ENV: ${{ secrets.PROD_ENV }}
        run: |
          # extract APP_HOSTNAME, ROOM_ID, ROOM_PIN, TURN_USERNAME, TURN_PASSWORD from PROD_ENV
          host=$(printf '%s\n' "$PROD_ENV" | grep '^APP_HOSTNAME=' | cut -d= -f2-)
          if [ -z "$host" ]; then
            echo "ERROR: APP_HOSTNAME not in PROD_ENV" >&2
            exit 1
          fi
          {
            echo "JANUS_WS_URL=wss://$host/janus-ws"
            echo "STUN_URL=stun:$host:3478"
            echo "TURN_URL=turn:$host:3478?transport=udp"
            printf '%s\n' "$PROD_ENV" | grep -E '^(ROOM_ID|ROOM_PIN|TURN_USERNAME|TURN_PASSWORD)='
          } >> "$GITHUB_ENV"

      - name: Build
        working-directory: src-tauri
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/voice-hub-desktop.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe
