name: Release Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.1-test)'
        required: true
        default: 'v0.0.0-dev'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build changelog
        id: changelog
        shell: bash
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          PREV=$(git tag --sort=-v:refname | grep -v "^${TAG}\$" | head -1 || true)
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV}..HEAD"
          fi

          LOG=$(git log --no-merges --format='%s' $RANGE \
            | grep -vE '^chore\(desktop\): bump' \
            | grep -vE '\[skip ci\]' || true)

          feats=$(echo "$LOG"  | grep -E  '^feat[!(:]'        | sed 's/^/- /' || true)
          fixes=$(echo "$LOG"  | grep -E  '^(fix|perf)[!(:]'  | sed 's/^/- /' || true)
          others=$(echo "$LOG" | grep -vE '^(feat|fix|perf)[!(:]' | sed 's/^/- /' || true)

          VERSION="${TAG#v}"
          INSTALLER="Voice.Hub_${VERSION}_x64-setup.exe"
          INSTALLER_URL="https://github.com/${REPO}/releases/download/${TAG}/${INSTALLER}"

          {
            echo 'body<<CHANGELOG_EOF'
            echo '## Download'
            echo
            echo "**Windows:** [\`${INSTALLER}\`](${INSTALLER_URL})"
            echo
            if [ -n "$feats"  ]; then echo '## Features';    echo "$feats";  echo; fi
            if [ -n "$fixes"  ]; then echo '## Fixes';       echo "$fixes";  echo; fi
            if [ -n "$others" ]; then echo '## Other';       echo "$others"; echo; fi
            if [ -n "$PREV" ]; then
              echo "**Full changelog**: https://github.com/${REPO}/compare/${PREV}...${TAG}"
            fi
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Inject hostname into IPC capability
        shell: bash
        env:
          APP_HOSTNAME: ${{ secrets.APP_HOSTNAME }}
        run: |
          set -euo pipefail
          if [ -z "$APP_HOSTNAME" ]; then
            echo "ERROR: secrets.APP_HOSTNAME not set" >&2
            exit 1
          fi
          sed -i "s|__APP_HOSTNAME__|$APP_HOSTNAME|g" src-tauri/capabilities/default.json

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_BASE_URL: https://${{ secrets.APP_HOSTNAME }}/
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: src-tauri
          tagName: ${{ steps.tag.outputs.tag }}
          releaseName: ${{ steps.tag.outputs.tag }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
          updaterJsonPreferNsis: true
