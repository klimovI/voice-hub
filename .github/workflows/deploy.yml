name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.prod.yml'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/voice-hub-app
          tags: |
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=voice-hub-app
          cache-to: type=gha,scope=voice-hub-app,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -z "$DEPLOY_HOST_KEY" ]; then
            echo "ERROR: DEPLOY_HOST_KEY secret is required (pin host key to prevent MITM)" >&2
            echo "Get it with: ssh-keyscan -t ed25519 <host>" >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOY_HOST_KEY" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # SSH target = DEPLOY_HOST (origin), not APP_HOSTNAME (CF-proxied).
      - name: Sync deploy files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "deploy@$DEPLOY_HOST" 'mkdir -p /opt/voice-hub/deploy'
          scp docker-compose.prod.yml "deploy@$DEPLOY_HOST:/opt/voice-hub/docker-compose.yml"
          scp deploy/Caddyfile "deploy@$DEPLOY_HOST:/opt/voice-hub/deploy/Caddyfile"

      - name: Write .env on host
        env:
          DEPLOY_HOST:        ${{ secrets.DEPLOY_HOST }}
          APP_HOSTNAME:       ${{ secrets.APP_HOSTNAME }}
          APP_ADMIN_PASSWORD: ${{ secrets.APP_ADMIN_PASSWORD }}
          IMAGE_TAG:          ${{ github.sha }}
        # DEPLOY_HOST doubles as PUBLIC_IP — must be literal IPv4.
        run: |
          umask 077
          if ! printf '%s' "$DEPLOY_HOST" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: DEPLOY_HOST must be a literal IPv4 (got: $DEPLOY_HOST)" >&2
            exit 1
          fi
          if [ -z "$APP_ADMIN_PASSWORD" ]; then
            echo "ERROR: APP_ADMIN_PASSWORD secret is required" >&2
            exit 1
          fi
          : > .env.deploy
          printf 'APP_HOSTNAME=%s\n'       "$APP_HOSTNAME"       >> .env.deploy
          printf 'PUBLIC_IP=%s\n'          "$DEPLOY_HOST"        >> .env.deploy
          printf 'APP_ADMIN_PASSWORD=%s\n' "$APP_ADMIN_PASSWORD" >> .env.deploy
          printf 'IMAGE_TAG=%s\n'          "$IMAGE_TAG"          >> .env.deploy
          scp .env.deploy "deploy@$DEPLOY_HOST:/opt/voice-hub/.env"
          ssh "deploy@$DEPLOY_HOST" 'chmod 600 /opt/voice-hub/.env'
          rm -f .env.deploy

      - name: Pull and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        # Caddyfile reload after `compose up` because compose doesn't track
        # bind-mount file content changes — caddy keeps stale config across
        # deploys otherwise. `caddy reload` is graceful (no dropped TLS) and
        # idempotent, safe to run every deploy.
        run: |
          ssh "deploy@$DEPLOY_HOST" 'cd /opt/voice-hub && docker compose pull && docker compose up -d --remove-orphans && docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile && docker image prune -af'

      - name: Smoke test
        env:
          DEPLOY_HOST:  ${{ secrets.DEPLOY_HOST }}
          APP_HOSTNAME: ${{ secrets.APP_HOSTNAME }}
        # Hit public HTTPS /healthz: proves DNS, TLS, caddy routing, AND
        # caddy<->app reachability all the way through. In-container
        # healthcheck does not.
        # 12×8s = ~100s window. Tolerates CF AOP cert propagation across
        # edges and caddy reload settle. Echoes HTTP code on failure to
        # distinguish 525 (CF↔origin TLS) from 5xx (origin app error) from
        # 403 (CF Bot Fight / WAF — Azure egress flagged). Real browser UA
        # avoids the curl/* signature trip.
        run: |
          UA='Mozilla/5.0 (X11; Linux x86_64; rv:128.0) Gecko/20100101 Firefox/128.0'
          for i in $(seq 1 12); do
            code=$(curl -fsS -A "$UA" -o /dev/null -w "%{http_code}" --max-time 8 "https://$APP_HOSTNAME/healthz" || true)
            if [ "$code" = "200" ]; then
              echo "smoke test passed on attempt $i"
              exit 0
            fi
            echo "attempt $i: HTTP $code, retrying in 8s..."
            sleep 8
          done
          echo "smoke test failed: https://$APP_HOSTNAME/healthz returned non-200" >&2
          ssh "deploy@$DEPLOY_HOST" 'cd /opt/voice-hub && docker compose ps && docker compose logs --tail 50' >&2 || true
          exit 1
