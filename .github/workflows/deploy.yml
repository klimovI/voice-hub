name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: voice-hub-app
            file: backend/Dockerfile
          - image: voice-hub-janus
            file: deploy/janus/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}:latest
            ghcr.io/${{ env.OWNER_LC }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -z "$DEPLOY_HOST_KEY" ]; then
            echo "ERROR: DEPLOY_HOST_KEY secret is required (pin host key to prevent MITM)" >&2
            echo "Get it with: ssh-keyscan -t ed25519 <host>" >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOY_HOST_KEY" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync deploy files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "deploy@$DEPLOY_HOST" 'mkdir -p /opt/audio-room/deploy'
          scp docker-compose.prod.yml "deploy@$DEPLOY_HOST:/opt/audio-room/docker-compose.yml"
          scp deploy/Caddyfile "deploy@$DEPLOY_HOST:/opt/audio-room/deploy/Caddyfile"

      - name: Write .env on host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          PROD_ENV:    ${{ secrets.PROD_ENV }}
        run: |
          umask 077
          printf '%s\n' "$PROD_ENV" > .env.deploy
          scp .env.deploy "deploy@$DEPLOY_HOST:/opt/audio-room/.env"
          ssh "deploy@$DEPLOY_HOST" 'chmod 600 /opt/audio-room/.env'
          rm -f .env.deploy

      - name: Pull and restart
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          ssh "deploy@$DEPLOY_HOST" 'cd /opt/audio-room && docker compose pull && docker compose up -d --remove-orphans'
