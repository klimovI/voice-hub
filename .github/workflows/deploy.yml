name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.prod.yml'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/voice-hub-app
          tags: |
            type=sha,format=long,prefix=

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha,scope=voice-hub-app
          cache-to: type=gha,scope=voice-hub-app,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -z "$DEPLOY_HOST_KEY" ]; then
            echo "ERROR: DEPLOY_HOST_KEY secret is required (pin host key to prevent MITM)" >&2
            echo "Get it with: ssh-keyscan -t ed25519 <host>" >&2
            exit 1
          fi
          printf '%s\n' "$DEPLOY_HOST_KEY" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Sync deploy files
        env:
          APP_HOSTNAME: ${{ secrets.APP_HOSTNAME }}
        run: |
          ssh "deploy@$APP_HOSTNAME" 'mkdir -p /opt/voice-hub/deploy'
          scp docker-compose.prod.yml "deploy@$APP_HOSTNAME:/opt/voice-hub/docker-compose.yml"
          scp deploy/Caddyfile "deploy@$APP_HOSTNAME:/opt/voice-hub/deploy/Caddyfile"

      - name: Write .env on host
        env:
          APP_HOSTNAME: ${{ secrets.APP_HOSTNAME }}
          PROD_ENV:     ${{ secrets.PROD_ENV }}
          IMAGE_TAG:    ${{ github.sha }}
        run: |
          umask 077
          printf '%s\n' "$PROD_ENV" > .env.deploy
          printf 'APP_HOSTNAME=%s\n' "$APP_HOSTNAME" >> .env.deploy
          printf 'IMAGE_TAG=%s\n'    "$IMAGE_TAG"    >> .env.deploy
          scp .env.deploy "deploy@$APP_HOSTNAME:/opt/voice-hub/.env"
          ssh "deploy@$APP_HOSTNAME" 'chmod 600 /opt/voice-hub/.env'
          rm -f .env.deploy

      - name: Pull and restart
        env:
          APP_HOSTNAME: ${{ secrets.APP_HOSTNAME }}
        # Caddyfile reload after `compose up` because compose doesn't track
        # bind-mount file content changes — caddy keeps stale config across
        # deploys otherwise. `caddy reload` is graceful (no dropped TLS) and
        # idempotent, safe to run every deploy.
        run: |
          ssh "deploy@$APP_HOSTNAME" 'cd /opt/voice-hub && docker compose pull && docker compose up -d --remove-orphans && docker exec voice-hub-caddy-1 caddy reload --config /etc/caddy/Caddyfile && docker image prune -af'

      - name: Smoke test
        env:
          APP_HOSTNAME: ${{ secrets.APP_HOSTNAME }}
        # Hit public HTTPS /healthz: proves DNS, TLS, caddy routing, AND
        # caddy<->app reachability all the way through. In-container
        # healthcheck does not.
        run: |
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 5 "https://$APP_HOSTNAME/healthz" >/dev/null; then
              echo "smoke test passed on attempt $i"
              exit 0
            fi
            echo "attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "smoke test failed: https://$APP_HOSTNAME/healthz unreachable" >&2
          ssh "deploy@$APP_HOSTNAME" 'cd /opt/voice-hub && docker compose ps && docker compose logs --tail 50' >&2 || true
          exit 1
