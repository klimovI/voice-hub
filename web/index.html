<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #07090a;
        --bg-1: #11181b;
        --bg-2: #182124;
        --bg-3: #1f292d;
        --bg-input: #0c1416;
        --line: #2a3a3f;
        --line-strong: #3a5057;
        --text: #e8efe9;
        --muted: #9aa8a2;
        --muted-2: #6b7872;
        --accent: #22c55e;
        --accent-strong: #16a34a;
        --accent-2: #050807;
        --accent-soft: rgba(34, 197, 94, 0.16);
        --good: #22c55e;
        --good-soft: rgba(34, 197, 94, 0.14);
        --danger: #f87171;
        --danger-soft: rgba(248, 113, 113, 0.12);
        --radius: 14px;
        --radius-lg: 20px;
        --shadow-lg: 0 30px 80px -22px rgba(0, 0, 0, 0.75), 0 8px 24px -8px rgba(0, 0, 0, 0.55);
      }

      * { box-sizing: border-box; }

      html, body { height: 100%; }

      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: var(--text);
        background: var(--bg-0);
        background-image:
          radial-gradient(900px 600px at 12% -10%, rgba(34, 197, 94, 0.10), transparent 60%),
          radial-gradient(700px 500px at 110% 10%, rgba(34, 197, 94, 0.05), transparent 55%),
          radial-gradient(600px 600px at 50% 120%, rgba(34, 197, 94, 0.06), transparent 60%);
        background-attachment: fixed;
        display: grid;
        place-items: start center;
        padding: 28px 20px 60px;
      }

      main {
        width: min(1180px, 100%);
        display: grid;
        gap: 22px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 14px 18px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent), var(--bg-1);
        border-radius: var(--radius-lg);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .brand-mark {
        width: 32px; height: 32px;
        border-radius: 10px;
        display: grid; place-items: center;
        background: var(--accent);
        color: var(--accent-2);
        font-weight: 800;
        box-shadow: 0 6px 22px -8px rgba(34, 197, 94, 0.55);
      }

      .brand-title { font-size: 16px; }
      .brand-sub { font-size: 12px; color: var(--muted); font-weight: 500; }

      .conn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: var(--bg-3);
        border: 1px solid var(--line-strong);
        font-size: 12px;
        color: var(--text);
      }

      .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--muted-2);
        box-shadow: 0 0 0 0 rgba(0,0,0,0);
      }
      .conn[data-state="ok"] .dot { background: var(--good); box-shadow: 0 0 0 4px var(--good-soft); }
      .conn[data-state="err"] .dot { background: var(--danger); box-shadow: 0 0 0 4px var(--danger-soft); }
      .conn[data-state="ok"] { color: var(--good); }
      .conn[data-state="err"] { color: var(--danger); }

      .layout {
        display: grid;
        gap: 22px;
        grid-template-columns: 380px 1fr;
      }

      .stack { display: grid; gap: 22px; align-content: start; }

      .card {
        position: relative;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent), var(--bg-1);
        box-shadow: var(--shadow-lg);
      }

      .card-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .card-title {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .card-hint {
        font-size: 12px;
        color: var(--muted-2);
      }

      form, .controls { display: grid; gap: 14px; }

      label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
      }

      input[type="text"] {
        width: 100%;
        margin-top: 6px;
        border: 1px solid var(--line-strong);
        border-radius: var(--radius);
        padding: 12px 14px;
        font: inherit;
        color: var(--text);
        background: var(--bg-input);
        transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
      }
      input[type="text"]::placeholder { color: var(--muted-2); }
      input[type="text"]:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
        background: #060b0c;
      }
      input[readonly] { cursor: pointer; }

      .actions, .inline-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        position: relative;
        border: 1px solid var(--accent);
        border-radius: var(--radius);
        padding: 11px 16px;
        font: inherit;
        font-weight: 700;
        font-size: 13px;
        color: var(--accent-2);
        background: var(--accent);
        cursor: pointer;
        transition: transform .08s ease, background .15s ease, border-color .15s ease, color .15s ease, box-shadow .15s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }
      button:hover {
        background: #34d674;
        border-color: #34d674;
      }
      button:active { transform: translateY(1px); }
      button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      button.secondary {
        background: var(--bg-3);
        border-color: var(--line-strong);
        color: var(--text);
      }
      button.secondary:hover {
        background: #2a3a3f;
        border-color: var(--accent);
        color: var(--accent);
      }

      button.danger {
        background: var(--bg-3);
        border-color: rgba(248, 113, 113, 0.4);
        color: var(--danger);
      }
      button.danger:hover {
        background: var(--danger);
        border-color: var(--danger);
        color: var(--accent-2);
      }

      button[aria-pressed="true"] {
        background: var(--danger-soft);
        border-color: var(--danger);
        color: var(--danger);
      }
      button[aria-pressed="true"]:hover {
        background: var(--danger);
        color: var(--accent-2);
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        filter: none;
      }

      .mini-button {
        padding: 8px 12px;
        font-size: 12px;
        border-radius: 10px;
      }

      .status {
        margin-top: 14px;
        padding: 10px 12px;
        border-radius: var(--radius);
        background: var(--bg-3);
        border: 1px solid var(--line-strong);
        color: var(--text);
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .status::before {
        content: "";
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
        flex: none;
      }
      .status[data-error="true"] {
        background: var(--danger-soft);
        border-color: rgba(248, 113, 113, 0.3);
        color: var(--danger);
      }
      .status[data-error="true"]::before {
        background: var(--danger);
        box-shadow: 0 0 0 4px var(--danger-soft);
      }

      .engine-row {
        display: grid;
        gap: 8px;
      }
      .engine-label {
        font-size: 13px;
        color: var(--muted);
      }
      .engine-toggle {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
        padding: 4px;
        background: var(--bg-input);
        border: 1px solid var(--line);
        border-radius: var(--radius);
      }
      .engine-opt {
        background: transparent;
        border: 1px solid transparent;
        color: var(--muted);
        font-weight: 600;
        font-size: 12px;
        padding: 8px 10px;
        border-radius: 10px;
        cursor: pointer;
        transition: background .12s ease, color .12s ease, border-color .12s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        gap: 0;
      }
      .engine-opt:hover {
        color: var(--text);
        background: var(--bg-3);
      }
      .engine-opt[aria-checked="true"] {
        background: var(--accent);
        color: var(--accent-2);
        border-color: var(--accent);
      }

      .slider-row { display: grid; gap: 8px; }
      .slider-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        font-size: 13px;
      }
      .slider-head span { color: var(--muted); }
      .slider-head strong {
        color: var(--accent);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        font-size: 12px;
        padding: 2px 8px;
        background: var(--accent-soft);
        border: 1px solid var(--accent);
        border-radius: 999px;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        background: var(--bg-input);
        border: 1px solid var(--line);
        border-radius: 999px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px; height: 18px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid var(--bg-0);
        box-shadow: 0 0 0 1px var(--accent), 0 2px 8px rgba(0,0,0,0.5);
        cursor: grab;
        transition: transform .12s ease;
      }
      input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.12); }
      input[type="range"]::-moz-range-thumb {
        width: 18px; height: 18px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid var(--bg-0);
        box-shadow: 0 0 0 1px var(--accent), 0 2px 8px rgba(0,0,0,0.5);
        cursor: grab;
      }
      input[type="range"]:disabled { opacity: 0.5; cursor: not-allowed; }

      kbd {
        display: inline-block;
        padding: 2px 6px;
        font-family: "SF Mono", "JetBrains Mono", ui-monospace, monospace;
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        background: var(--bg-input);
        border: 1px solid var(--line-strong);
        border-bottom-width: 2px;
        border-radius: 6px;
      }

      .participant-list {
        display: grid;
        gap: 10px;
      }

      .participant-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        padding: 14px 16px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--bg-2);
        transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
      }
      .participant-row:hover { border-color: var(--line-strong); background: var(--bg-3); }

      .participant-speaking {
        border-color: var(--accent);
        background: linear-gradient(180deg, var(--good-soft), transparent), var(--bg-2);
        box-shadow: 0 0 0 1px var(--accent), 0 8px 30px -10px rgba(34, 197, 94, 0.45);
      }

      .participant-info {
        display: grid;
        grid-template-columns: 36px 1fr;
        gap: 12px;
        align-items: center;
        min-width: 0;
      }
      .participant-info::before {
        content: attr(data-initial);
        width: 36px; height: 36px;
        border-radius: 50%;
        display: grid; place-items: center;
        background: var(--accent);
        color: var(--accent-2);
        font-weight: 800;
        font-size: 14px;
        text-transform: uppercase;
        flex: none;
        box-shadow: 0 4px 14px -4px rgba(34, 197, 94, 0.5);
      }

      .participant-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .participant-meta {
        margin-top: 2px;
        font-size: 12px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .participant-meta::before {
        content: "";
        width: 6px; height: 6px;
        border-radius: 50%;
        background: var(--muted-2);
      }
      .participant-row[data-state="speaking"] .participant-meta { color: var(--good); }
      .participant-row[data-state="speaking"] .participant-meta::before {
        background: var(--good);
        box-shadow: 0 0 0 3px var(--good-soft);
      }
      .participant-row[data-state="muted"] .participant-meta { color: var(--danger); }
      .participant-row[data-state="muted"] .participant-meta::before { background: var(--danger); }
      .participant-row[data-state="connecting"] .participant-meta::before {
        background: var(--accent);
        animation: pulse 1.4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }

      .participant-actions {
        display: flex;
        gap: 14px;
        align-items: center;
        justify-content: flex-end;
      }

      .participant-slider {
        display: grid;
        gap: 4px;
        width: 200px;
      }
      .participant-slider span {
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
        font-size: 11px;
        color: var(--muted);
      }

      .participant-empty {
        padding: 28px;
        text-align: center;
        color: var(--muted);
        border: 1px dashed var(--line-strong);
        border-radius: var(--radius);
        background: var(--bg-2);
        font-size: 13px;
      }

      @media (max-width: 960px) {
        .layout { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        body { padding: 16px 12px 40px; }
        .card { padding: 18px; }
        .participant-row { grid-template-columns: 1fr; }
        .participant-actions { justify-content: flex-start; flex-wrap: wrap; }
        .participant-slider { width: 100%; }
        .topbar { flex-wrap: wrap; }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">V</div>
          <div>
            <div class="brand-title">Voice Hub</div>
            <div class="brand-sub">Low-latency voice over WebRTC</div>
          </div>
        </div>
        <div id="status" class="conn" data-state="idle" data-error="false">
          <span class="dot"></span>
          <span>Ready</span>
        </div>
      </header>

      <div class="layout">
        <div class="stack">
          <section class="card">
            <div class="card-head">
              <h2 class="card-title">Session</h2>
              <span class="card-hint">Microphone & room</span>
            </div>
            <form id="join-form">
              <label>
                Display name
                <input id="display-name" name="displayName" type="text" placeholder="e.g. Ilya" autocomplete="off">
              </label>
              <div class="actions">
                <button id="join-button" type="submit">Join Room</button>
                <button id="self-mute-button" class="secondary" type="button" disabled>Mute Me</button>
                <button id="deafen-button" class="secondary" type="button" disabled>Deafen</button>
                <button id="leave-button" class="danger" type="button" disabled>Leave</button>
              </div>
            </form>
          </section>

          <section class="card controls">
            <div class="card-head">
              <h2 class="card-title">Audio</h2>
              <button id="audio-reset" class="secondary mini-button" type="button">Reset</button>
            </div>

            <div class="engine-row">
              <span class="engine-label">Denoiser</span>
              <div id="denoiser-engine" class="engine-toggle" role="radiogroup" aria-label="Denoiser engine">
                <button type="button" class="engine-opt" data-engine="off" role="radio">Off</button>
                <button type="button" class="engine-opt" data-engine="rnnoise" role="radio">RNNoise</button>
                <button type="button" class="engine-opt" data-engine="dtln" role="radio">DTLN</button>
              </div>
            </div>

            <div class="slider-row">
              <div class="slider-head">
                <span>Suppression strength</span>
                <strong id="rnnoise-mix-value">70%</strong>
              </div>
              <input id="rnnoise-mix" type="range" min="0" max="100" step="5" value="70">
            </div>

            <div class="slider-row">
              <div class="slider-head">
                <span>Mic send volume</span>
                <strong id="send-volume-value">100%</strong>
              </div>
              <input id="send-volume" type="range" min="0" max="300" step="5" value="100">
            </div>

            <div class="slider-row">
              <div class="slider-head">
                <span>Master output</span>
                <strong id="output-volume-value">50%</strong>
              </div>
              <input id="output-volume" type="range" min="0" max="200" step="5" value="50">
              <div class="inline-actions" style="margin-top: 6px;">
                <button id="output-mute-button" class="secondary mini-button" type="button">Mute Output</button>
              </div>
            </div>
          </section>

          <section class="card controls">
            <div class="card-head">
              <h2 class="card-title">Hotkey</h2>
              <span class="card-hint">Toggle mute</span>
            </div>
            <label>
              Click input, then press a combo
              <input id="shortcut-input" type="text" readonly value="Ctrl + Shift + M">
            </label>
            <div class="inline-actions">
              <button id="shortcut-reset" class="secondary mini-button" type="button">Reset to default</button>
            </div>
          </section>
        </div>

        <div class="stack">
          <section class="card">
            <div class="card-head">
              <h2 class="card-title">Participants</h2>
              <span class="card-hint">Per-user volume & mute</span>
            </div>
            <div id="participants" class="participant-list">
              <div class="participant-empty">No one here yet — share the room link to invite people.</div>
            </div>
          </section>
        </div>
      </div>

      <script type="module" src="/app.js"></script>
    </main>
  </body>
</html>
