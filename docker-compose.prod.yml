name: voice-hub

# Pin the docker network subnet so APP_TRUSTED_PROXIES can hard-reference it.
# 10.200.200.0/24 chosen to dodge 172.16.0.0/12 (Docker auto-allocation +
# common VPN ranges). On collision, change BOTH the subnet and the env value.
networks:
  default:
    ipam:
      config:
        - subnet: 10.200.200.0/24

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # caddy_data is mounted RO into app so pion can serve TURNS off the same
    # ACME-managed pair. App-compromise blast radius now extends to the HTTPS
    # private key — accepted vs running a second ACME client.
    security_opt:
      - no-new-privileges:true
    depends_on:
      - app

  app:
    image: ghcr.io/klimovi/voice-hub-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 128m
    environment:
      APP_ADDR: ":8080"
      WEB_DIR: "/app/web"
      APP_HOSTNAME: "${APP_HOSTNAME:?APP_HOSTNAME is required}"
      PUBLIC_IP: "${PUBLIC_IP:?PUBLIC_IP is required}"
      APP_ADMIN_PASSWORD: "${APP_ADMIN_PASSWORD:?APP_ADMIN_PASSWORD is required}"
      APP_TRUSTED_PROXIES: "10.200.200.0/24"
      # Caddy stores cert pairs under /data/caddy/certificates/<acme-dir>/<host>/.
      # Glob the issuer segment so prod LE / staging / zerossl all resolve.
      APP_TURN_TLS_PORT: "5349"
      APP_TURN_TLS_CERT_GLOB: "/caddy-data/caddy/certificates/*/${APP_HOSTNAME}/${APP_HOSTNAME}.crt"
      APP_TURN_TLS_KEY_GLOB: "/caddy-data/caddy/certificates/*/${APP_HOSTNAME}/${APP_HOSTNAME}.key"
    expose:
      - "8080"
    ports:
      - "3478:3478/udp"
      - "5349:5349"
      - "10101-10200:10101-10200/udp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - app_data:/app/data
      # RO mount preserves read_only:true on the app container.
      - caddy_data:/caddy-data:ro
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
  app_data:
