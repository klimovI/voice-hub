name: voice-hub

# Pin the docker network subnet so APP_TRUSTED_PROXIES can hard-reference it.
# 10.200.200.0/24 chosen to dodge 172.16.0.0/12 (Docker auto-allocation +
# common VPN ranges). On collision, change BOTH the subnet and the env value.
networks:
  default:
    ipam:
      config:
        - subnet: 10.200.200.0/24

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 32m
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    security_opt:
      - no-new-privileges:true
    # Start-order only — not health-gated. App's docker-DNS reachability
    # from caddy is what matters and that is independent of the in-container
    # /healthz which only proves app answers itself. Brief 502s on cold start
    # are preferred to caddy refusing to start when app health is delayed.
    depends_on:
      - app

  app:
    image: ghcr.io/klimovi/voice-hub-app:${IMAGE_TAG:?IMAGE_TAG is required}
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 128m
    environment:
      APP_ADDR: ":8080"
      WEB_DIR: "/app/web"
      APP_HOSTNAME: "${APP_HOSTNAME:?APP_HOSTNAME is required}"
      PUBLIC_IP: "${PUBLIC_IP:?PUBLIC_IP is required}"
      APP_ADMIN_PASSWORD: "${APP_ADMIN_PASSWORD:?APP_ADMIN_PASSWORD is required}"
      APP_TRUSTED_PROXIES: "10.200.200.0/24"
      # Port ranges shared with compose `ports:` below — single source of truth.
      # Override in /opt/voice-hub/.env if you need to widen further.
      UDP_PORT_MIN: "${UDP_PORT_MIN:-10000}"
      UDP_PORT_MAX: "${UDP_PORT_MAX:-11000}"
      TURN_RELAY_PORT_MIN: "${TURN_RELAY_PORT_MIN:-49000}"
      TURN_RELAY_PORT_MAX: "${TURN_RELAY_PORT_MAX:-49500}"
    expose:
      - "8080"
    ports:
      - "3478:3478/udp"
      - "${UDP_PORT_MIN:-10000}-${UDP_PORT_MAX:-11000}:${UDP_PORT_MIN:-10000}-${UDP_PORT_MAX:-11000}/udp"
      - "${TURN_RELAY_PORT_MIN:-49000}-${TURN_RELAY_PORT_MAX:-49500}:${TURN_RELAY_PORT_MIN:-49000}-${TURN_RELAY_PORT_MAX:-49500}/udp"
    volumes:
      - app_data:/app/data
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
  app_data:
