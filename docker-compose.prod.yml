name: voice-hub

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    security_opt:
      - no-new-privileges:true
    depends_on:
      - app

  app:
    image: ghcr.io/klimovi/voice-hub-app:latest
    restart: unless-stopped
    environment:
      APP_ADDR: ":8080"
      WEB_DIR: "/app/web"
      APP_HOSTNAME: "${APP_HOSTNAME:?APP_HOSTNAME is required}"
      PUBLIC_IP: "${PUBLIC_IP:?PUBLIC_IP is required}"
      TURN_SHARED_SECRET: "${TURN_SHARED_SECRET:?TURN_SHARED_SECRET is required}"
      APP_AUTH_USER: "${APP_AUTH_USER:?APP_AUTH_USER is required}"
      APP_AUTH_PASSWORD: "${APP_AUTH_PASSWORD:?APP_AUTH_PASSWORD is required}"
      APP_SESSION_SECRET: "${APP_SESSION_SECRET:?APP_SESSION_SECRET is required (>=16 bytes random)}"
    expose:
      - "8080"
    ports:
      - "3478:3478/udp"
      - "10000-10100:10000-10100/udp"
      - "49160-49200:49160-49200/udp"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
