# LOCAL DEV ONLY — bound to 127.0.0.1, requires APP_ALLOW_INSECURE=1.
# Do not run on public hosts. Production layout: docker-compose.prod.yml.
name: voice-hub

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ADDR: ":8080"
      WEB_DIR: "/app/web"
      APP_HOSTNAME: "localhost"
      PUBLIC_IP: "127.0.0.1"
      APP_ADMIN_PASSWORD: "dev"
      APP_COOKIE_SECURE: "false"
      APP_ALLOW_INSECURE: "1"
      # Narrow ranges for dev — fewer iptables rules = faster `compose up`.
      # Prod widens these via /opt/voice-hub/.env.
      UDP_PORT_MIN: "10101"
      UDP_PORT_MAX: "10200"
      TURN_RELAY_PORT_MIN: "49160"
      TURN_RELAY_PORT_MAX: "49200"
    volumes:
      - app_data:/app/data
    ports:
      - "127.0.0.1:8080:8080"
      - "3478:3478/udp"
      - "10101-10200:10101-10200/udp"
      - "49160-49200:49160-49200/udp"

volumes:
  app_data:
